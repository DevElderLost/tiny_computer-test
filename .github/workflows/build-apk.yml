name: Build APK

# Otomatis jalan tiap ada push ke branch APAPUN (selalu build DEBUG, desktop_env default xfce).
# Bisa juga dijalankan manual lewat tab Actions -> "Run workflow" buat pilih desktop_env/build_type/release_tag sendiri (termasuk build release).
on:
  push:
  workflow_dispatch:
    inputs:
      desktop_env:
        description: "Desktop environment"
        required: true
        type: choice
        default: xfce
        options:
          - xfce
          - lxqt
          - gxde
      build_type:
        description: "Build type"
        required: true
        type: choice
        default: release
        options:
          - release
          - debug
      name_suffix:
        description: "Suffix opsional untuk nama APK (contoh: targetSdk35)"
        required: false
        default: ""
      release_tag:
        description: "Tag release di Cateners/tiny_container untuk ambil jniLibs.zip & patch.tar.gz. Default v1.1.0 -- JANGAN pakai 'latest', upstream sudah rename repo & rilis v4.0.0 sudah tidak menyertakan patch.tar.gz lagi."
        required: true
        default: "v1.1.0"

jobs:
  build:
    runs-on: ubuntu-latest
    # Kalau trigger-nya push -> selalu debug & desktop_env xfce.
    # Kalau trigger-nya manual (workflow_dispatch) -> pakai input yang diisi user, fallback ke default kalau kosong.
    env:
      DESKTOP_ENV: ${{ github.event_name == 'push' && 'xfce' || (inputs.desktop_env || 'xfce') }}
      BUILD_TYPE: ${{ github.event_name == 'push' && 'debug' || (inputs.build_type || 'release') }}
      NAME_SUFFIX: ${{ github.event_name == 'push' && '' || (inputs.name_suffix || '') }}
      RELEASE_TAG: ${{ inputs.release_tag || 'v1.1.0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK (NDK + CMake)
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake versi yang dipakai project
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pin ke versi tertentu kalau build mulai pecah karena update flutter:
          # flutter-version: "3.x.x"

      - name: flutter pub get
        run: flutter pub get

      - name: Generate localization (lib/l10n)
        run: flutter gen-l10n

      # ---- Ambil jniLibs.zip & patch.tar.gz dari Releases (rootfs SENGAJA TIDAK didownload di sini) ----
      # CATATAN: upstream sudah rename Cateners/tiny_computer -> Cateners/tiny_container,
      # dan release "latest" mereka (v4.0.0+) SUDAH TIDAK menyertakan patch.tar.gz lagi.
      # Makanya release_tag di-pin ke v1.1.0 (rilis terakhir yang strukturnya masih cocok sama fork ini).
      - name: Download jniLibs.zip & patch.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/dl
          if [ "$RELEASE_TAG" = "latest" ]; then
            gh release download --repo Cateners/tiny_container \
              --pattern "jniLibs.zip" --pattern "patch.tar.gz" -D /tmp/dl
          else
            gh release download "$RELEASE_TAG" --repo Cateners/tiny_container \
              --pattern "jniLibs.zip" --pattern "patch.tar.gz" -D /tmp/dl
          fi

      - name: Extract jniLibs ke android/app/src/main/jniLibs/arm64-v8a
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          unzip -o /tmp/dl/jniLibs.zip -d android/app/src/main/jniLibs/arm64-v8a

      - name: Copy patch.tar.gz ke assets
        run: cp /tmp/dl/patch.tar.gz assets/patch.tar.gz

      # Rootfs (assets/xa*) sengaja di-skip biar build cepat.
      # APK hasil build ini BELUM ada rootfs di dalamnya -- perlu ditambahkan manual
      # (unzip APK -> taruh xa* di assets/flutter_assets/assets/ -> re-sign) sebelum dipakai jalan.

      # ---- Setup keystore (cuma kalau BUILD_TYPE = release) ----
      - name: Setup keystore untuk release signing
        if: ${{ env.BUILD_TYPE == 'release' }}
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::Secret ANDROID_KEYSTORE_BASE64 belum diisi, isi dulu di Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks
          cat > android/keystore.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      # ---- Tunggu semua dependency JitPack di build.gradle selesai build SEBELUM lanjut ----
      # Berbeda dari project yang pakai gradle/libs.versions.toml, di sini dependency JitPack
      # didefinisikan langsung di android/build.gradle lewat dependencySubstitution, contoh:
      #   substitute module('com.github.tiny-computer:avnc') using module('com.github.DevElderLost:avnc-test:b9cfba667d')
      # Step ini otomatis nge-scan SEMUA baris "using module('com.github...')" di build.gradle,
      # jadi kalau nanti nambah substitusi JitPack lain, cukup tambah baris di build.gradle --
      # gak perlu ubah workflow ini. Tiap dependency dicek SATU PER SATU: request .pom otomatis
      # MEMICU build di JitPack kalau belum pernah di-build, lalu di-poll sampai HTTP 200 (siap)
      # atau gagal/timeout.
      - name: Tunggu build JitPack selesai
        run: |
          set +e
          GRADLE_FILE="android/build.gradle"
          MAX_TRIES=100   # 100 x 15s = ~25 menit maksimal nunggu PER dependency

          if [ ! -f "$GRADLE_FILE" ]; then
            echo "::error::File $GRADLE_FILE tidak ditemukan, cek path-nya."
            exit 1
          fi

          # Ambil semua target "using module('group:artifact:version')" yang groupnya com.github (JitPack)
          MODULES=$(grep -oE "using module\('com\.github\.[^']+'\)" "$GRADLE_FILE" \
            | sed -E "s/using module\('(.+)'\)/\1/")

          if [ -z "$MODULES" ]; then
            echo "Tidak ada dependency JitPack (com.github...) yang perlu ditunggu."
            exit 0
          fi

          echo "Dependency JitPack yang terdeteksi:"
          echo "$MODULES"
          echo "---"

          FAILED=0
          echo "$MODULES" | while IFS= read -r MODULE; do
            [ -z "$MODULE" ] && continue

            GROUP=$(echo "$MODULE" | cut -d: -f1)
            ARTIFACT=$(echo "$MODULE" | cut -d: -f2)
            VERSION=$(echo "$MODULE" | cut -d: -f3)
            GROUP_PATH=$(echo "$GROUP" | tr '.' '/')

            POM_URL="https://jitpack.io/$GROUP_PATH/$ARTIFACT/$VERSION/$ARTIFACT-$VERSION.pom"
            API_URL="https://jitpack.io/api/builds/$GROUP/$ARTIFACT/$VERSION"
            LOG_URL="https://jitpack.io/$GROUP_PATH/$ARTIFACT/$VERSION/build.log"

            echo "== $GROUP:$ARTIFACT:$VERSION =="
            echo "POM : $POM_URL"
            echo "Log : $LOG_URL"

            READY=0
            for i in $(seq 1 "$MAX_TRIES"); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$POM_URL")

              if [ "$HTTP_CODE" = "200" ]; then
                echo "[$i/$MAX_TRIES] $ARTIFACT siap di JitPack (HTTP 200)."
                READY=1
                break
              fi

              API_RESPONSE=$(curl -s --max-time 20 "$API_URL")
              if echo "$API_RESPONSE" | grep -qi '"error"'; then
                echo "::error::Build JitPack untuk $ARTIFACT:$VERSION GAGAL. Cek log: $LOG_URL"
                exit 1
              fi

              echo "[$i/$MAX_TRIES] Masih nunggu JitPack build $ARTIFACT... (HTTP $HTTP_CODE)"
              sleep 15
            done

            if [ "$READY" != "1" ]; then
              echo "::error::Timeout nunggu JitPack build $ARTIFACT (~25 menit). Cek manual: $LOG_URL"
              exit 1
            fi
          done || exit 1

          echo "Semua dependency JitPack sudah siap."

      # ---- Build ----
      - name: flutter build apk (release)
        if: ${{ env.BUILD_TYPE == 'release' }}
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=tiny_computer/sdi

      - name: flutter build apk (debug)
        if: ${{ env.BUILD_TYPE == 'debug' }}
        run: |
          flutter build apk --debug \
            --target-platform android-arm64 \
            --split-per-abi

      # ---- Rename output sesuai konvensi build.ps1 (tiny-computer-<env>[-<suffix>].apk) ----
      - name: Rename APK
        run: |
          SRC="build/app/outputs/flutter-apk/app-arm64-v8a-${BUILD_TYPE}.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::APK tidak ditemukan di $SRC"
            ls -la build/app/outputs/flutter-apk/ || true
            exit 1
          fi

          NAME="tiny-computer-${DESKTOP_ENV}-norootfs"
          if [ -n "$NAME_SUFFIX" ]; then
            NAME="${NAME}-${NAME_SUFFIX}"
          fi
          # Tandai build dari auto-push biar gampang dibedain di artifact list
          if [ "${{ github.event_name }}" = "push" ]; then
            NAME="${NAME}-${BUILD_TYPE}-$(echo ${{ github.sha }} | cut -c1-7)"
          fi

          mkdir -p out
          cp "$SRC" "out/${NAME}.apk"
          if [ -f "${SRC}.sha1" ]; then
            cp "${SRC}.sha1" "out/${NAME}.apk.sha1"
          else
            sha1sum "out/${NAME}.apk" | awk '{print $1}' > "out/${NAME}.apk.sha1"
          fi

          echo "APK_NAME=${NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: out/*
          retention-days: 14