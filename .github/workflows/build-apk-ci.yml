name: Build APK

# Project ini sudah disync ke basis tiny_container v4.0.0 (native Kotlin/Gradle, BUKAN Flutter lagi).
# Logika trigger SAMA seperti workflow versi Flutter sebelumnya:
#   - Push ke branch APAPUN -> otomatis build DEBUG.
#   - Manual lewat tab Actions -> "Run workflow" -> bisa pilih build_type & release_tag sendiri.
on:
  push:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release
      release_tag:
        description: "Tag release di Cateners/tiny_container untuk ambil jniLibs.zip (isi 'latest' kalau mau yang terbaru)"
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Push -> selalu debug. Manual -> ikut pilihan user, fallback debug kalau kosong.
      BUILD_TYPE: ${{ github.event_name == 'push' && 'debug' || (inputs.build_type || 'debug') }}
      RELEASE_TAG: ${{ inputs.release_tag || 'latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        # Gradle 9.4.1 (dipakai project ini lewat gradlew) butuh minimal JDK 17 buat jalan,
        # walaupun app-nya sendiri target Java 11 (sourceCompatibility di app/build.gradle.kts).
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle (dengan caching otomatis)
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ---- Tunggu JitPack selesai build dependency avnc SEBELUM lanjut ----
      # Hash/group/artifact dibaca otomatis dari gradle/libs.versions.toml, jadi step ini
      # tetap jalan walau hash-nya nanti diganti lagi (gak perlu diedit manual di sini).
      # Request pertama ke URL .pom otomatis MEMICU build di JitPack kalau belum pernah
      # di-build; selanjutnya kita poll sampai HTTP 200 (artifact siap) atau gagal/timeout.
      - name: Tunggu build JitPack (avnc) selesai
        run: |
          set +e
          TOML="gradle/libs.versions.toml"

          VERSION=$(grep -E '^avnc[[:space:]]*=[[:space:]]*"' "$TOML" | sed -E 's/.*=[[:space:]]*"([^"]+)".*/\1/')
          GROUP=$(grep -E '^avnc[[:space:]]*=.*group' "$TOML" | sed -E 's/.*group[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          ARTIFACT=$(grep -E '^avnc[[:space:]]*=.*group' "$TOML" | sed -E 's/.*name[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          GROUP_PATH=$(echo "$GROUP" | tr '.' '/')

          POM_URL="https://jitpack.io/$GROUP_PATH/$ARTIFACT/$VERSION/$ARTIFACT-$VERSION.pom"
          API_URL="https://jitpack.io/api/builds/$GROUP/$ARTIFACT/$VERSION"
          LOG_URL="https://jitpack.io/$GROUP_PATH/$ARTIFACT/$VERSION/build.log"

          echo "avnc -> $GROUP:$ARTIFACT:$VERSION"
          echo "POM  : $POM_URL"
          echo "Log  : $LOG_URL"

          MAX_TRIES=100   # 100 x 15s = ~25 menit maksimal nunggu
          for i in $(seq 1 "$MAX_TRIES"); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$POM_URL")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "[$i/$MAX_TRIES] Artifact sudah siap di JitPack (HTTP 200). Lanjut build."
              exit 0
            fi

            API_RESPONSE=$(curl -s --max-time 20 "$API_URL")
            if echo "$API_RESPONSE" | grep -qi '"error"'; then
              echo "::error::Build JitPack untuk $ARTIFACT:$VERSION GAGAL. Cek log: $LOG_URL"
              exit 1
            fi

            echo "[$i/$MAX_TRIES] Masih nunggu JitPack build... (HTTP $HTTP_CODE)"
            sleep 15
          done

          echo "::error::Timeout nunggu JitPack build avnc (~25 menit). Cek manual: $LOG_URL"
          exit 1

      # ---- Ambil jniLibs.zip dari Releases (rootfs.tar.zst SENGAJA TIDAK didownload di sini) ----
      # Beda dari versi lama: patch.tar.gz & debian-*.tar.xz sudah tidak ada lagi di struktur baru ini.
      # Rootfs sekarang cukup 1 file (app/src/main/assets/rootfs.tar.zst, gitignored) -- ditambahkan manual nanti.
      - name: Download jniLibs.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/dl
          if [ "$RELEASE_TAG" = "latest" ]; then
            gh release download --repo Cateners/tiny_container --pattern "jniLibs.zip" -D /tmp/dl
          else
            gh release download "$RELEASE_TAG" --repo Cateners/tiny_container --pattern "jniLibs.zip" -D /tmp/dl
          fi

      - name: Extract jniLibs ke app/src/main/jniLibs/arm64-v8a
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          unzip -o /tmp/dl/jniLibs.zip -d app/src/main/jniLibs/arm64-v8a

      # ---- Build ----
      # Tidak perlu setup keystore sama sekali: project ini sekarang TIDAK punya signingConfig
      # untuk release buildType (lihat app/build.gradle.kts -- release cuma proguard, tanpa signing),
      # dan debug otomatis pakai debug keystore bawaan Android. NDK/CMake juga tidak di-pin versinya,
      # jadi Gradle bakal auto-resolve/download sendiri saat build (tidak perlu sdkmanager manual lagi).
      - name: Build APK (debug)
        if: ${{ env.BUILD_TYPE == 'debug' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Build APK (release, unsigned)
        if: ${{ env.BUILD_TYPE == 'release' }}
        run: ./gradlew assembleRelease --no-daemon

      # ---- Rename & siapkan output ----
      - name: Rename APK
        run: |
          SRC="app/build/outputs/apk/${BUILD_TYPE}/app-${BUILD_TYPE}.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::APK tidak ditemukan di $SRC"
            find app/build/outputs/apk -type f 2>/dev/null
            exit 1
          fi

          NAME="tiny-container-norootfs-${BUILD_TYPE}"
          if [ "${{ github.event_name }}" = "push" ]; then
            NAME="${NAME}-$(echo ${{ github.sha }} | cut -c1-7)"
          fi

          mkdir -p out
          cp "$SRC" "out/${NAME}.apk"
          echo "APK_NAME=${NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: out/*
          retention-days: 14
          
