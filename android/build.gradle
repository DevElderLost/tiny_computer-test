allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
    configurations.all {
        resolutionStrategy.dependencySubstitution {
            substitute module('com.github.tiny-computer:avnc') using module('com.github.DevElderLost:avnc-test:b9cfba667d')
            substitute module('com.github.tiny-computer:termux-x11') using module('com.github.DevElderLost:termux-x11-test:21159a1405')
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
